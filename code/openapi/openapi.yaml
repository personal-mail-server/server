openapi: 3.0.3
info:
  title: Personal Mail Server API
  version: 0.1.0
  description: Login, logout, token reissue, and test mail address management contract
servers:
  - url: /
paths:
  /api/v1/auth/login:
    post:
      summary: 로그인
      description: 로그인 ID와 비밀번호를 검증하고 토큰 쌍을 발급한다.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: 로그인 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginSuccessResponse'
        '400':
          description: 요청 형식 또는 입력값 검증 실패
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                invalidBody:
                  value:
                    code: INVALID_REQUEST_BODY
                    message: 입력값 형식이 올바르지 않습니다.
                invalidLogin:
                  value:
                    code: INVALID_LOGIN_ID_FORMAT
                    message: 입력값 형식이 올바르지 않습니다.
                invalidPassword:
                  value:
                    code: INVALID_PASSWORD_FORMAT
                    message: 입력값 형식이 올바르지 않습니다.
                missingField:
                  value:
                    code: MISSING_REQUIRED_FIELD
                    message: 입력값 형식이 올바르지 않습니다.
        '401':
          description: 인증 실패
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: INVALID_CREDENTIALS
                message: 로그인 ID 또는 비밀번호가 올바르지 않습니다.
        '423':
          description: 계정 잠금
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: ACCOUNT_LOCKED
                message: 계정이 일시적으로 잠겼습니다. 잠시 후 다시 시도해 주세요.
        '500':
          description: 서버 내부 오류
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: INTERNAL_SERVER_ERROR
                message: 요청을 처리할 수 없습니다. 잠시 후 다시 시도해 주세요.
  /api/v1/auth/logout:
    post:
      summary: 로그아웃
      description: Bearer 액세스 토큰을 검증한 뒤 계정의 전체 세션을 무효화한다.
      security:
        - bearerAuth: []
      responses:
        '204':
          description: 로그아웃 성공
        '401':
          description: 인증 실패 또는 무효 세션
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: INVALID_ACCESS_TOKEN
                message: 인증 정보가 유효하지 않습니다. 다시 로그인해 주세요.
        '500':
          description: 서버 내부 오류
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: INTERNAL_SERVER_ERROR
                message: 요청을 처리할 수 없습니다. 잠시 후 다시 시도해 주세요.
  /api/v1/auth/token/reissue:
    post:
      summary: 토큰 재발급
      description: 유효한 리프레시 토큰을 검증하고 새 액세스 토큰과 새 리프레시 토큰을 발급한다.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReissueRequest'
      responses:
        '200':
          description: 토큰 재발급 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginSuccessResponse'
        '400':
          description: 요청 형식 또는 입력값 검증 실패
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                invalidBody:
                  value:
                    code: INVALID_REQUEST_BODY
                    message: 입력값 형식이 올바르지 않습니다.
                missingField:
                  value:
                    code: MISSING_REQUIRED_FIELD
                    message: 입력값 형식이 올바르지 않습니다.
        '401':
          description: 리프레시 토큰 검증 실패 또는 무효 세션
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: INVALID_REFRESH_TOKEN
                message: 인증 정보가 유효하지 않습니다. 다시 로그인해 주세요.
        '500':
          description: 서버 내부 오류
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: INTERNAL_SERVER_ERROR
                message: 요청을 처리할 수 없습니다. 잠시 후 다시 시도해 주세요.
  /api/v1/test-addresses/generate:
    post:
      summary: 테스트용 메일 주소 후보 생성
      description: Bearer 액세스 토큰을 검증한 뒤 현재 사용 가능한 테스트용 메일 주소 후보를 반환한다.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 후보 생성 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TestAddressGenerateResponse'
        '401':
          description: 인증 실패 또는 무효 세션
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: INVALID_ACCESS_TOKEN
                message: 인증 정보가 유효하지 않습니다. 다시 로그인해 주세요.
        '500':
          description: 서버 내부 오류
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: INTERNAL_SERVER_ERROR
                message: 요청을 처리할 수 없습니다. 잠시 후 다시 시도해 주세요.
  /api/v1/test-addresses:
    get:
      summary: 테스트용 메일 주소 목록 조회
      description: Bearer 액세스 토큰을 검증한 뒤 현재 사용자의 테스트용 메일 주소 목록을 반환한다.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 목록 조회 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TestAddressListResponse'
        '401':
          description: 인증 실패 또는 무효 세션
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: INVALID_ACCESS_TOKEN
                message: 인증 정보가 유효하지 않습니다. 다시 로그인해 주세요.
        '500':
          description: 서버 내부 오류
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: INTERNAL_SERVER_ERROR
                message: 요청을 처리할 수 없습니다. 잠시 후 다시 시도해 주세요.
    post:
      summary: 테스트용 메일 주소 생성
      description: Bearer 액세스 토큰을 검증한 뒤 사용자가 입력한 테스트용 메일 주소를 생성한다.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TestAddressCreateRequest'
      responses:
        '201':
          description: 테스트용 메일 주소 생성 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TestAddressResponse'
        '400':
          description: 요청 형식 또는 이메일 입력값 검증 실패
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                invalidBody:
                  value:
                    code: INVALID_REQUEST_BODY
                    message: 입력값 형식이 올바르지 않습니다.
                invalidEmail:
                  value:
                    code: INVALID_EMAIL_FORMAT
                    message: 입력값 형식이 올바르지 않습니다.
                missingField:
                  value:
                    code: MISSING_REQUIRED_FIELD
                    message: 입력값 형식이 올바르지 않습니다.
        '401':
          description: 인증 실패 또는 무효 세션
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: INVALID_ACCESS_TOKEN
                message: 인증 정보가 유효하지 않습니다. 다시 로그인해 주세요.
        '409':
          description: 이미 존재하는 테스트용 메일 주소
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: DUPLICATE_TEST_ADDRESS_EMAIL
                message: 이미 사용 중인 메일 주소입니다.
        '500':
          description: 서버 내부 오류
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: INTERNAL_SERVER_ERROR
                message: 요청을 처리할 수 없습니다. 잠시 후 다시 시도해 주세요.
  /api/v1/test-addresses/{id}:
    get:
      summary: 테스트용 메일 주소 상세 조회
      description: Bearer 액세스 토큰을 검증한 뒤 지정한 테스트용 메일 주소의 상세 정보를 반환한다.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: 상세 조회 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TestAddressResponse'
        '401':
          description: 인증 실패 또는 무효 세션
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: INVALID_ACCESS_TOKEN
                message: 인증 정보가 유효하지 않습니다. 다시 로그인해 주세요.
        '404':
          description: 존재하지 않는 테스트용 메일 주소
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: RESOURCE_NOT_FOUND
                message: 요청한 대상을 찾을 수 없습니다.
        '500':
          description: 서버 내부 오류
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: INTERNAL_SERVER_ERROR
                message: 요청을 처리할 수 없습니다. 잠시 후 다시 시도해 주세요.
    put:
      summary: 테스트용 메일 주소 수정
      description: Bearer 액세스 토큰을 검증한 뒤 지정한 테스트용 메일 주소를 수정한다.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TestAddressUpdateRequest'
      responses:
        '200':
          description: 테스트용 메일 주소 수정 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TestAddressResponse'
        '400':
          description: 요청 형식 또는 이메일 입력값 검증 실패
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                invalidBody:
                  value:
                    code: INVALID_REQUEST_BODY
                    message: 입력값 형식이 올바르지 않습니다.
                invalidEmail:
                  value:
                    code: INVALID_EMAIL_FORMAT
                    message: 입력값 형식이 올바르지 않습니다.
                missingField:
                  value:
                    code: MISSING_REQUIRED_FIELD
                    message: 입력값 형식이 올바르지 않습니다.
        '401':
          description: 인증 실패 또는 무효 세션
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: INVALID_ACCESS_TOKEN
                message: 인증 정보가 유효하지 않습니다. 다시 로그인해 주세요.
        '404':
          description: 존재하지 않거나 접근할 수 없는 테스트용 메일 주소
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: RESOURCE_NOT_FOUND
                message: 요청한 대상을 찾을 수 없습니다.
        '409':
          description: 이미 존재하는 테스트용 메일 주소
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: DUPLICATE_TEST_ADDRESS_EMAIL
                message: 이미 사용 중인 메일 주소입니다.
        '500':
          description: 서버 내부 오류
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: INTERNAL_SERVER_ERROR
                message: 요청을 처리할 수 없습니다. 잠시 후 다시 시도해 주세요.
    delete:
      summary: 테스트용 메일 주소 논리 삭제
      description: Bearer 액세스 토큰을 검증한 뒤 지정한 테스트용 메일 주소를 논리 삭제한다.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '204':
          description: 테스트용 메일 주소 논리 삭제 성공
        '401':
          description: 인증 실패 또는 무효 세션
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: INVALID_ACCESS_TOKEN
                message: 인증 정보가 유효하지 않습니다. 다시 로그인해 주세요.
        '404':
          description: 존재하지 않거나 접근할 수 없는 테스트용 메일 주소
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: RESOURCE_NOT_FOUND
                message: 요청한 대상을 찾을 수 없습니다.
        '500':
          description: 서버 내부 오류
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: INTERNAL_SERVER_ERROR
                message: 요청을 처리할 수 없습니다. 잠시 후 다시 시도해 주세요.
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    LoginRequest:
      type: object
      required:
        - loginId
        - password
      properties:
        loginId:
          type: string
          minLength: 4
          maxLength: 32
          pattern: '^[a-z0-9-]{4,32}$'
        password:
          type: string
          minLength: 8
          maxLength: 64
          pattern: '^(?=.*[A-Za-z])(?=.*[0-9])[^\s]{8,64}$'
    LoginSuccessResponse:
      type: object
      required:
        - accessToken
        - refreshToken
        - accessTokenExpiresIn
        - refreshTokenExpiresIn
        - tokenType
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        accessTokenExpiresIn:
          type: integer
          enum: [1800]
        refreshTokenExpiresIn:
          type: integer
          enum: [604800]
        tokenType:
          type: string
          enum: [Bearer]
    ReissueRequest:
      type: object
      required:
        - refreshToken
      properties:
        refreshToken:
          type: string
          minLength: 1
          pattern: '.*\S.*'
    ErrorResponse:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
        message:
          type: string
    TestAddressGenerateResponse:
      type: object
      required:
        - email
      properties:
        email:
          type: string
          example: test-a1b2c3d4e5f6@mail.local
    TestAddressCreateRequest:
      type: object
      required:
        - email
      properties:
        email:
          type: string
          format: email
          example: created@mail.local
    TestAddressUpdateRequest:
      type: object
      required:
        - email
      properties:
        email:
          type: string
          format: email
          example: updated@mail.local
    TestAddressResponse:
      type: object
      required:
        - id
        - ownerUserId
        - email
        - createdAt
        - updatedAt
      properties:
        id:
          type: integer
          format: int64
        ownerUserId:
          type: integer
          format: int64
        email:
          type: string
          format: email
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        deletedAt:
          type: string
          format: date-time
          nullable: true
    TestAddressListResponse:
      type: object
      required:
        - addresses
      properties:
        addresses:
          type: array
          items:
            $ref: '#/components/schemas/TestAddressResponse'
