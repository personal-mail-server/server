name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  go-checks:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: code
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: code/go.mod
          cache: true

      - name: Run go test
        run: go test ./...

      - name: Run go build
        run: go build ./...

      - name: Run go vet
        run: go vet ./...

  docker-smoke:
    runs-on: ubuntu-latest
    needs: go-checks
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start stack
        run: make up

      - name: Check container status
        run: make status

      - name: Wait for frontend
        run: |
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:3000 >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          exit 1

      - name: Wait for backend docs
        run: |
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:3000/docs >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          exit 1

      - name: Check frontend page
        run: curl -fsS http://localhost:3000 >/tmp/login-page.html

      - name: Check swagger page
        run: curl -fsS http://localhost:3000/docs >/tmp/swagger-page.html

      - name: Check successful login
        run: |
          python3 - <<'PY'
          import json, urllib.request
          req = urllib.request.Request(
              'http://localhost:18080/api/v1/auth/login',
              data=json.dumps({'loginId': 'user-01', 'password': 'pass1234'}).encode(),
              headers={'Content-Type': 'application/json'},
          )
          with urllib.request.urlopen(req) as resp:
              payload = json.loads(resp.read().decode())
              assert resp.status == 200
              assert isinstance(payload['accessToken'], str) and payload['accessToken']
              assert isinstance(payload['refreshToken'], str) and payload['refreshToken']
              assert payload['accessTokenExpiresIn'] == 1800
              assert payload['refreshTokenExpiresIn'] == 604800
              assert payload['tokenType'] == 'Bearer'
          PY

      - name: Check openapi yaml
        run: curl -fsS http://localhost:3000/docs/openapi.yaml >/tmp/openapi.yaml

      - name: Check login lock flow
        run: |
          python3 - <<'PY'
          import json, urllib.request, urllib.error

          url = 'http://localhost:18080/api/v1/auth/login'
          data = json.dumps({'loginId': 'user-01', 'password': 'wrongpass1'}).encode()
          statuses = []

          for _ in range(5):
              req = urllib.request.Request(url, data=data, headers={'Content-Type': 'application/json'})
              try:
                  with urllib.request.urlopen(req) as resp:
                      statuses.append(resp.status)
              except urllib.error.HTTPError as exc:
                  statuses.append(exc.code)

          assert statuses[:4] == [401, 401, 401, 401], statuses
          assert statuses[4] == 423, statuses

          valid = json.dumps({'loginId': 'user-01', 'password': 'pass1234'}).encode()
          req = urllib.request.Request(url, data=valid, headers={'Content-Type': 'application/json'})
          try:
              with urllib.request.urlopen(req) as resp:
                  raise AssertionError(f'expected locked response, got {resp.status}')
          except urllib.error.HTTPError as exc:
              assert exc.code == 423, exc.code
          PY

      - name: Show container logs on failure
        if: failure()
        run: docker compose -f code/docker-compose.yml logs

      - name: Stop stack
        if: always()
        run: make down
